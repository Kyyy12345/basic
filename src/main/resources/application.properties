spring.application.name=basic
# MariaDB
spring.datasource.url=jdbc:mariadb://svc.sel3.cloudtype.app:30995/kyy?serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=1234
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

#JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.auto_quote_keyword=true
logging.level.org.hibernate.orm.jdbc.bind=trace


# log level
logging.level.com.example.basic=trace

# file upload 최대 용량 설정(200MB)
spring.servlet.multipart.max-file-size=209715200
spring.servlet.multipart.max-request-size=209715200